<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Production Supervisor Interview AI Coach V3</title>
<script src="data/vocabulary.js"></script>
<script src="data/interview.js"></script>
<script src="data/ipa44.js"></script>
<style>
:root{--bg:#eef5ff;--card:#fff;--ink:#071a3a;--muted:#64748b;--line:#dbe6f4;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#f59e0b;--shadow:0 14px 35px rgba(15,23,42,.08);--radius:18px}*{box-sizing:border-box}body{margin:0;background:linear-gradient(#f7fbff,#eef5ff);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;color:var(--ink)}.wrap{max-width:1280px;margin:auto;padding:28px}h1{font-size:32px;margin:0 0 4px;font-weight:900}h2{margin:0 0 14px;font-size:25px}.sub{color:var(--muted);margin-bottom:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.nav{display:grid;grid-template-columns:repeat(8,minmax(125px,1fr));gap:12px;margin:18px 0 24px}.tab{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;font-weight:850;box-shadow:var(--shadow);cursor:pointer}.tab.active{outline:2px solid #bfa6ff}.view{display:none}.view.active{display:block}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:16px}.grid{display:grid;gap:14px}.grid2{grid-template-columns:repeat(2,1fr)}.grid3{grid-template-columns:repeat(3,1fr)}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0}.btn{border:0;background:#071427;color:white;padding:11px 16px;border-radius:12px;font-weight:850;cursor:pointer}.btn.blue{background:var(--blue)}.btn.green{background:var(--green)}.btn.red{background:#e66b73}.btn.light{background:#fff;color:var(--ink);border:1px solid var(--line)}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font:inherit;background:#fff}textarea{min-height:96px}.pill{display:inline-block;border-radius:999px;padding:5px 10px;background:#eef2ff;color:#1d4ed8;font-weight:800;font-size:13px;margin:3px}.pill.green{background:#dcfce7;color:#166534}.pill.red{background:#fee2e2;color:#b91c1c}.small{font-size:13px;color:var(--muted)}.fb{background:#f8fbff;border:1px solid var(--line);border-radius:14px;padding:14px}.full{grid-column:1/-1}.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.score{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}.score b{font-size:28px;color:var(--blue)}.chat{height:300px;overflow:auto;background:#f8fbff;border:1px solid var(--line);border-radius:14px;padding:14px}.msg{max-width:82%;padding:12px 14px;border-radius:14px;margin:8px 0}.msg.ai{background:#fff;border:1px solid var(--line)}.msg.you{background:#dbeafe;margin-left:auto}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:100}.modal.show{display:flex}.sheet{width:min(760px,94vw);max-height:92vh;overflow:auto;background:white;border-radius:24px;padding:24px;box-shadow:var(--shadow)}.close{float:right;border:0;background:transparent;font-size:25px;cursor:pointer}.wave{width:100%;height:140px;background:#eef4fb;border-radius:16px}.timer{font-size:34px;font-weight:950;text-align:center}.dot{width:10px;height:10px;border-radius:50%;background:#94a3b8;display:inline-block}.dot.on{background:#16a34a}.list{max-height:520px;overflow:auto}.item{padding:13px;border:1px solid var(--line);border-radius:14px;margin-bottom:9px;background:#fff;cursor:pointer}.item:hover{border-color:#93c5fd}.quote{border-left:4px solid var(--blue);padding-left:12px;color:#334155}.errorbox{border:1px solid #fecaca;background:#fff7f7;color:#991b1b;padding:12px;border-radius:12px;white-space:pre-wrap}.ipa-symbol{font-size:42px;font-weight:950}.answer-option{display:block;margin:8px 0;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;text-align:left}.answer-option.correct{border-color:var(--green);background:#ecfdf5}.answer-option.wrong{border-color:var(--red);background:#fef2f2}@media(max-width:900px){.nav,.grid2,.grid3{grid-template-columns:1fr}.top{display:block}.score-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><h1>Production Supervisor Interview AI Coach V3 🌐</h1><div class="sub">Interview thứ 2 · câu hỏi thật · mẫu câu · IPA 44 · ghi âm 60s · AI đánh giá</div></div><div class="toolbar"><button class="btn light" onclick="openSettings()">⚙️ Cài đặt AI</button><button class="btn light" onclick="exportErrors()">↗ Xuất lỗi</button></div></div>
  <div id="nav" class="nav"></div>
  <main>
    <section id="dashboard" class="view active"></section>
    <section id="interview" class="view"></section>
    <section id="patterns" class="view"></section>
    <section id="ipa" class="view"></section>
    <section id="vocab" class="view"></section>
    <section id="speaking" class="view"></section>
    <section id="roleplay" class="view"></section>
    <section id="errors" class="view"></section>
    <section id="settings" class="view"></section>
  </main>
</div>

<div class="modal" id="recModal"><div class="sheet"><button class="close" onclick="closeRecorder()">×</button><div class="fb"><div class="small">Đọc/trả lời câu này:</div><h3 id="recPrompt"></h3><button class="btn light" onclick="speakText(document.getElementById('recPrompt').textContent)">🔊 Nghe</button></div><br><div class="fb"><div class="timer"><span id="recTime">00:00</span> / 01:00</div><canvas id="wave" class="wave"></canvas><div class="toolbar"><span class="dot" id="recDot"></span><span id="recStatus" class="small">Chưa ghi âm</span></div></div><br><textarea id="recTranscript" placeholder="Transcript sẽ hiện ở đây. Bạn có thể sửa trước khi gửi AI."></textarea><div class="toolbar"><button id="startRecBtn" class="btn green" onclick="startRecording()">🎙 Bắt đầu</button><button id="stopRecBtn" class="btn red" onclick="stopRecording()" disabled>⏹ Dừng</button><button class="btn blue" onclick="sendRecording()">Gửi AI</button></div></div></div>
<div class="modal" id="settingsModal"><div class="sheet"><button class="close" onclick="closeSettings()">×</button><h2>Cài đặt AI Online</h2><p class="small">Backend dùng <b>OPENROUTER_API_KEY</b> trên Vercel. Không dán key vào frontend.</p><label>AI endpoint</label><input id="endpoint" value="/api/ai-coach"><br><br><label>Tên người học</label><input id="learnerName"><br><br><label>Target role</label><input id="targetRole"><br><br><label>Kinh nghiệm thật</label><textarea id="learnerProfile"></textarea><div class="toolbar"><button class="btn" onclick="saveSettings()">Lưu</button><button class="btn light" onclick="testAI()">Test AI</button></div><div id="aiTest" class="fb">Chưa test.</div></div></div>

<script>
if(!window.VOCAB_DATA) window.VOCAB_DATA=[];
if(!window.INTERVIEW_DATA) window.INTERVIEW_DATA=[];
if(!window.INTERVIEW_PATTERNS) window.INTERVIEW_PATTERNS=[];
if(!window.IPA44_DATA) window.IPA44_DATA=[];
const APP_KEY='pi_coach_v3_state';
const state=JSON.parse(localStorage.getItem(APP_KEY)||'null')||{view:'dashboard',endpoint:'/api/ai-coach',learnerName:'Hùng',targetRole:'Production Supervisor',profile:'Production Shift Leader, 3 production lines, 8 Team Leaders, around 120 operators, MES, Power BI, delivery, productivity, ramp-up, quality, safety.',errors:[],learned:{},weak:{},aiStatus:'unknown',interviewIdx:0,ipaIdx:0,vocabIdx:0};
const views=[['dashboard','🏠 Dashboard'],['interview','🧑‍💼 Interview Bank'],['patterns','🧩 Sentence Patterns'],['ipa','🔊 IPA 44'],['vocab','📚 Vocabulary'],['speaking','🎙 Speaking Room'],['roleplay','🏭 Role-play'],['errors','🧾 Error Notebook']];
const scenarios=['There is an urgent order that must ship tomorrow. Can your shift support it?','Line 2 is behind target by 15%. What should you do?','QA found repeated defects in the last batch. What is your first action?','Several operators are absent today. How will you balance manpower?','A machine stopped during peak output time. What will you do?','A new model ramp-up is unstable. How will you support it?','An operator did not follow PPE requirements. What will you do?'];
let currentMode='speaking', currentPrompt=scenarios[0], currentExtra={}, followUpStore={};
function $(id){return document.getElementById(id)}function save(){localStorage.setItem(APP_KEY,JSON.stringify(state))}function safe(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function show(v){state.view=v;save();document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));$(v).classList.add('active');document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.view===v));}
function init(){renderNav();safeRender('dashboard',renderDashboard);safeRender('interview',renderInterview);safeRender('patterns',renderPatterns);safeRender('ipa',renderIPA);safeRender('vocab',renderVocab);safeRender('speaking',renderSpeaking);safeRender('roleplay',renderRoleplay);safeRender('errors',renderErrors);show(state.view||'dashboard');}
function safeRender(id,fn){try{fn()}catch(e){console.error(id,e);$(id).innerHTML=`<div class="card"><h2>Lỗi module ${id}</h2><div class="errorbox">${safe(e.stack||e.message)}</div></div>`}}
function renderNav(){ $('nav').innerHTML=views.map(([id,name])=>`<button class="tab" data-view="${id}" onclick="show('${id}')">${name}</button>`).join('')+`<button class="tab" onclick="openSettings()">⚙️ Settings</button>`}
function statusBadge(){let label=state.aiStatus==='online'?'AI online':state.aiStatus==='offline'?'AI offline / lỗi kết nối':state.aiStatus==='testing'?'Đang test AI...':'AI chưa test';let color=state.aiStatus==='online'?'on':'';let style=state.aiStatus==='offline'?'style="background:#dc2626"':state.aiStatus==='testing'?'style="background:#f59e0b"':'';return `<span class="toolbar"><span class="dot ${color}" ${style}></span><span class="small">${label}</span></span>`}
function setAIStatus(s,detail=''){state.aiStatus=s;save();document.querySelectorAll('.aiStatus').forEach(x=>x.innerHTML=statusBadge()); if(detail&&$('aiTest'))$('aiTest').innerHTML=detail}
function renderDashboard(){ $('dashboard').innerHTML=`<div class="grid grid3"><div class="card"><h2>Interview thứ 2</h2><p>20 câu hỏi từ tài liệu Production Supervisor + mẫu trả lời song ngữ.</p><button class="btn blue" onclick="show('interview')">Học interview</button></div><div class="card"><h2>IPA 44</h2><p>44 âm tiếng Anh: cách đọc, câu mẫu, nhận diện, ghi âm và test sơ bộ.</p><button class="btn blue" onclick="show('ipa')">Học phát âm</button></div><div class="card"><h2>AI Coach</h2><div class="aiStatus">${statusBadge()}</div><p class="small">AI chỉ online thật sau khi Test AI hoặc Gửi & phân tích thành công.</p><button class="btn light" onclick="openSettings()">Test AI</button></div></div><div class="card"><h2>Kế hoạch gấp trước thứ 2</h2><div class="grid grid3"><div class="fb"><b>Ngày 1</b><br>Tell me about yourself, scope, KPI, output, delivery.</div><div class="fb"><b>Ngày 2</b><br>Quality, 8D, Fishbone, manpower, Team Leaders.</div><div class="fb"><b>Ngày 3</b><br>Ramp-up, MES/Power BI, Kaizen/5S, weakness, why choose you.</div></div></div>`}
function renderInterview(){let cats=['All',...new Set(INTERVIEW_DATA.map(x=>x.category))];$('interview').innerHTML=`<div class="card"><h2>Production Supervisor Interview Bank</h2><p class="small">Dữ liệu lấy từ tài liệu bạn gửi: 20 câu hỏi, sample answer, ý tiếng Việt và key phrases.</p><div class="toolbar"><select id="intCat" onchange="updateInterview()">${cats.map(x=>`<option>${x}</option>`).join('')}</select><select id="intPri" onchange="updateInterview()"><option>All</option><option>Must learn</option><option>Normal</option></select><input id="intSearch" placeholder="Tìm câu hỏi / topic..." oninput="updateInterview()"></div><div class="grid grid2"><div class="card list" id="intList"></div><div class="card" id="intCard"></div></div></div>`;updateInterview()}
function interviewFiltered(){let c=$('intCat')?.value||'All',p=$('intPri')?.value||'All',q=($('intSearch')?.value||'').toLowerCase();return INTERVIEW_DATA.filter(x=>(c==='All'||x.category===c)&&(p==='All'||x.priority===p)&&(!q||JSON.stringify(x).toLowerCase().includes(q)))}
function updateInterview(){let arr=interviewFiltered();if(!arr.length){$('intList').innerHTML='Không có câu hỏi';return}if(state.interviewIdx>=arr.length)state.interviewIdx=0;let cur=arr[state.interviewIdx];$('intList').innerHTML=arr.map((x,i)=>`<div class="item" onclick="state.interviewIdx=${i};save();updateInterview()"><b>${x.number}. ${safe(x.question)}</b><br><span class="small">${safe(x.category)} · ${safe(x.priority)}</span></div>`).join('');$('intCard').innerHTML=`<div class="pill green">${safe(cur.category)}</div><h2>${cur.number}. ${safe(cur.question)}</h2><p class="small">${safe(cur.questionVi)}</p><div class="toolbar"><button class="btn light" onclick="speakText('${safe(cur.question).replace(/'/g,"\\'")}')">🔊 Nghe câu hỏi</button><button class="btn light" onclick="speakText('${safe(cur.sampleAnswer).replace(/'/g,"\\'")}')">🔊 Nghe mẫu</button><button class="btn blue" onclick="startInterviewQuestion('${cur.id}')">🎙 Trả lời</button></div><div class="fb"><b>Sample answer</b><br>${safe(cur.sampleAnswer)}</div><br><div class="fb"><b>Ý tiếng Việt</b><br>${safe(cur.vietnameseIdea)}</div><br><div><b>Key phrases</b><br>${(cur.keyPhrases||[]).map(x=>`<span class="pill">${safe(x)}</span>`).join('')}</div><br><textarea id="intAnswer" placeholder="Nhập câu trả lời của bạn ở đây..."></textarea><button class="btn blue" onclick="sendInterviewManual('${cur.id}')">Gửi & AI sửa</button><div id="intFeedback" style="margin-top:14px"></div>`}
function startInterviewQuestion(id){let q=INTERVIEW_DATA.find(x=>x.id===id);currentMode='interview';currentPrompt=q.question;currentExtra=q;openRecorder(q.question)}
function sendInterviewManual(id){let q=INTERVIEW_DATA.find(x=>x.id===id),ans=$('intAnswer').value.trim();if(!ans)return alert('Nhập câu trả lời trước.');currentMode='interview';currentPrompt=q.question;currentExtra=q;analyzeAndRender('intFeedback',ans)}
function renderPatterns(){let cats=['All',...new Set(INTERVIEW_PATTERNS.map(x=>x.category))];$('patterns').innerHTML=`<div class="card"><h2>Interview Sentence Patterns</h2><div class="toolbar"><select id="patCat" onchange="updatePatterns()">${cats.map(x=>`<option>${x}</option>`).join('')}</select></div><div id="patList" class="grid grid2"></div></div>`;updatePatterns()}
function updatePatterns(){let c=$('patCat')?.value||'All';let arr=INTERVIEW_PATTERNS.filter(x=>c==='All'||x.category===c);$('patList').innerHTML=arr.map(x=>`<div class="fb"><span class="pill">${safe(x.category)}</span><h3>${safe(x.pattern)}</h3><p class="small">${safe(x.meaningVi)}</p><div class="quote">${safe(x.example)}</div><div class="toolbar"><button class="btn light" onclick="speakText('${safe(x.example).replace(/'/g,"\\'")}')">🔊 Nghe ví dụ</button><button class="btn blue" onclick="currentMode='pattern';currentPrompt='Use this pattern in your own answer: ${safe(x.pattern).replace(/'/g,"\\'")}';openRecorder(currentPrompt)">🎙 Luyện</button></div></div>`).join('')}
function renderIPA(){let types=['All',...new Set(IPA44_DATA.map(x=>x.type))];$('ipa').innerHTML=`<div class="card"><h2>IPA 44 Sounds</h2><p class="small">Chấm phát âm ở đây là sơ bộ qua transcript + AI. Muốn word-level acoustic scoring chuẩn như Elsa cần API phát âm riêng.</p><div class="toolbar"><select id="ipaType" onchange="updateIPA(true)">${types.map(x=>`<option>${x}</option>`).join('')}</select><input id="ipaSearch" placeholder="Tìm âm/từ mẫu..." oninput="updateIPA(true)"></div><div class="grid grid2"><div class="card list" id="ipaList"></div><div class="card" id="ipaCard"></div></div></div>`;updateIPA()}
function ipaFiltered(){let t=$('ipaType')?.value||'All',q=($('ipaSearch')?.value||'').toLowerCase();return IPA44_DATA.filter(x=>(t==='All'||x.type===t)&&(!q||JSON.stringify(x).toLowerCase().includes(q)))}
function updateIPA(reset=false){let arr=ipaFiltered();if(reset)state.ipaIdx=0;if(state.ipaIdx>=arr.length)state.ipaIdx=0;let cur=arr[state.ipaIdx]||IPA44_DATA[0];$('ipaList').innerHTML=arr.map((x,i)=>`<div class="item" onclick="state.ipaIdx=${i};save();updateIPA()"><b>${safe(x.symbol)}</b> · ${safe(x.sampleWord)}<br><span class="small">${safe(x.type)}</span></div>`).join('');if(!cur){$('ipaCard').innerHTML='No IPA data';return}$('ipaCard').innerHTML=`<div class="ipa-symbol">${safe(cur.symbol)}</div><div class="pill">${safe(cur.type)}</div><p><b>Cách phát âm:</b> ${safe(cur.howToPronounceVi)}</p><p><b>Từ mẫu:</b> ${safe(cur.examples)}</p><p><b>Câu luyện:</b> ${safe(cur.practiceSentence)}</p><div class="toolbar"><button class="btn light" onclick="speakText('${safe(cur.examples).replace(/'/g,"\\'")}')">🔊 Nghe từ mẫu</button><button class="btn light" onclick="speakText('${safe(cur.practiceSentence).replace(/'/g,"\\'")}')">🔊 Nghe câu</button><button class="btn blue" onclick="practiceIPA('${cur.id}')">🎙 Test phát âm</button></div><div class="fb"><b>Bài tập nhận diện</b><br>${safe(cur.recognitionQuestion)}<div id="ipaOptions">${cur.recognitionOptions.map(o=>`<button class="answer-option" onclick="checkIPAOption(this,'${safe(o)}','${safe(cur.answer)}')">${safe(o)}</button>`).join('')}</div></div><div id="ipaFeedback" style="margin-top:12px"></div>`}
function checkIPAOption(btn,val,ans){btn.classList.add(val===ans?'correct':'wrong');if($('ipaFeedback'))$('ipaFeedback').innerHTML=val===ans?'<span class="pill green">Đúng</span>':'<span class="pill red">Sai, nghe lại từ mẫu.</span>'}
function practiceIPA(id){let x=IPA44_DATA.find(v=>v.id===id);currentMode='ipa';currentPrompt=x.testInstruction;currentExtra=x;openRecorder(x.testInstruction)}
function renderVocab(){let cats=['All',...new Set(VOCAB_DATA.map(x=>x.mainCategory||x.category).filter(Boolean))],topics=['All',...new Set(VOCAB_DATA.map(x=>x.topic).filter(Boolean))];$('vocab').innerHTML=`<div class="card"><h2>Vocabulary Bank</h2><p class="small">${VOCAB_DATA.length} mục từ/cụm. Có TOEIC 600, Manufacturing, Interview Phrases.</p><div class="toolbar"><select id="vCat" onchange="updateVocab(true)">${cats.map(x=>`<option>${x}</option>`).join('')}</select><select id="vTopic" onchange="updateVocab(true)">${topics.map(x=>`<option>${x}</option>`).join('')}</select><input id="vSearch" placeholder="Tìm từ..." oninput="updateVocab(true)"></div><div class="grid grid2"><div class="card list" id="vList"></div><div class="card" id="vCard"></div></div></div>`;updateVocab()}
function vocabFiltered(){let c=$('vCat')?.value||'All',t=$('vTopic')?.value||'All',q=($('vSearch')?.value||'').toLowerCase();return VOCAB_DATA.filter(x=>(c==='All'||(x.mainCategory||x.category)===c)&&(t==='All'||x.topic===t)&&(!q||JSON.stringify(x).toLowerCase().includes(q)))}
function updateVocab(reset=false){let arr=vocabFiltered();if(reset)state.vocabIdx=0;if(state.vocabIdx>=arr.length)state.vocabIdx=0;let cur=arr[state.vocabIdx]||arr[0];$('vList').innerHTML=arr.slice(0,200).map((x,i)=>`<div class="item" onclick="state.vocabIdx=${i};save();updateVocab()"><b>${safe(x.term)}</b><br><span class="small">${safe(x.topic||'')} · ${safe(x.type||'')}</span></div>`).join('');if(!cur){$('vCard').innerHTML='No vocabulary data';return}$('vCard').innerHTML=`<h2>${safe(cur.term)}</h2><p>${safe(cur.partOfSpeech||cur.type||'')} ${cur.ipa?'- '+safe(cur.ipa):''}</p><div class="fb"><b>Nghĩa</b><br>${safe(cur.vietnameseMeaning||'')}</div><br><div class="fb"><b>Example</b><br>${safe(cur.exampleSentence||'')}</div><br><div><b>Collocations</b><br>${String(cur.collocations||'').split(';').filter(Boolean).map(x=>`<span class="pill">${safe(x.trim())}</span>`).join('')}</div><div class="toolbar"><button class="btn light" onclick="speakText('${safe(cur.term).replace(/'/g,"\\'")}')">🔊 Từ</button><button class="btn light" onclick="speakText('${safe(cur.exampleSentence||cur.term).replace(/'/g,"\\'")}')">🔊 Ví dụ</button><button class="btn blue" onclick="currentMode='vocab';currentPrompt='Use this vocabulary in one interview sentence: ${safe(cur.term).replace(/'/g,"\\'")}';currentExtra=${JSON.stringify({}).replace(/"/g,'&quot;')};openRecorder(currentPrompt)">🎙 Luyện</button></div>`}
function renderSpeaking(){currentPrompt=scenarios[0];$('speaking').innerHTML=`<div class="card"><h2>Virtual Speaking Room</h2><div class="aiStatus">${statusBadge()}</div><div class="toolbar"><button class="btn light" onclick="newScenario()">↻ Đổi tình huống</button><button class="btn light" onclick="speakText(currentPrompt)">🔊 Nghe câu hỏi</button></div><div class="chat" id="sChat"><div class="msg ai">${safe(currentPrompt)}</div></div><div class="toolbar"><button class="btn" onclick="currentMode='speaking';openRecorder(currentPrompt)">🎙 Trả lời bằng giọng nói</button><button class="btn light" onclick="$('sInput').focus()">⌨ Nhập</button></div><textarea id="sInput" placeholder="Hoặc nhập câu trả lời ở đây..."></textarea><button class="btn blue" onclick="sendSpeakingManual()">Gửi & phân tích</button><div id="sFeedback" style="margin-top:14px"></div></div>`}
function newScenario(){currentPrompt=scenarios[Math.floor(Math.random()*scenarios.length)];renderSpeaking()}
function sendSpeakingManual(){let ans=$('sInput').value.trim();if(!ans)return alert('Nhập câu trả lời trước.');currentMode='speaking';analyzeAndRender('sFeedback',ans);$('sChat').innerHTML+=`<div class="msg you">${safe(ans)}</div>`}
function renderRoleplay(){let roles=['Production Manager','QA Staff','Maintenance Engineer','Team Leader','Warehouse Staff','EHS Officer'];$('roleplay').innerHTML=`<div class="card"><h2>Factory Role-play</h2><div class="grid grid3">${roles.map((r,i)=>{let q=scenarios[i%scenarios.length];return `<div class="fb"><b>${r}</b><br>${safe(q)}<div class="toolbar"><button class="btn light" onclick="speakText('${safe(r+': '+q).replace(/'/g,"\\'")}')">🔊 Nghe</button><button class="btn blue" onclick="currentMode='roleplay';currentPrompt='${safe(r+': '+q).replace(/'/g,"\\'")}';openRecorder(currentPrompt)">Start</button></div></div>`}).join('')}</div><div id="rFeedback" style="margin-top:14px"></div></div>`}
function renderErrors(){ $('errors').innerHTML=`<div class="card"><h2>Error Notebook</h2><p class="small">Lưu câu trả lời, lỗi và professional answer.</p><div class="list">${state.errors.map(e=>`<div class="fb"><b>${safe(e.mode)} · ${safe(e.date)}</b><br><span class="small">${safe(e.question)}</span><br><br><b>Your answer:</b> ${safe(e.answer)}<br><b>Professional:</b> ${safe(e.professionalAnswer||'')}</div>`).join('<br>')||'Chưa có lỗi.'}</div></div>`}
function openSettings(){renderSettings();$('settingsModal').classList.add('show')}function closeSettings(){$('settingsModal').classList.remove('show')}function renderSettings(){ if($('endpoint')){ $('endpoint').value=state.endpoint;$('learnerName').value=state.learnerName;$('targetRole').value=state.targetRole;$('learnerProfile').value=state.profile;}}
function saveSettings(){state.endpoint=$('endpoint').value.trim()||'/api/ai-coach';state.learnerName=$('learnerName').value;state.targetRole=$('targetRole').value;state.profile=$('learnerProfile').value;save()}
async function testAI(){saveSettings();$('aiTest').innerHTML='Đang test AI...';let r=await callAI({mode:'test',question:'Test AI connection for Production Supervisor interview.',answer:'I manage three production lines.',role:state.targetRole,profile:state.profile});$('aiTest').innerHTML=r.ok?'<span class="pill green">AI hoạt động</span><br>'+safe(r.text).slice(0,800):'<span class="pill red">Chưa kết nối</span><br>'+safe(r.text).slice(0,900)}
function speakText(t){if(!('speechSynthesis'in window))return alert('Trình duyệt không hỗ trợ loa.');speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.86;speechSynthesis.speak(u)}
const rec={stream:null,ctx:null,analyser:null,raf:null,start:0,timer:null,recognition:null,target:''};function openRecorder(prompt){rec.target=prompt;$('recPrompt').textContent=prompt;$('recTranscript').value='';$('recTime').textContent='00:00';$('recStatus').textContent='Chưa ghi âm';$('recDot').className='dot';$('recModal').classList.add('show');drawEmptyWave()}function closeRecorder(){stopRecording();$('recModal').classList.remove('show')}function drawEmptyWave(){let c=$('wave'),ctx=c.getContext('2d');c.width=c.clientWidth;c.height=c.clientHeight;ctx.clearRect(0,0,c.width,c.height);ctx.strokeStyle='#93c5fd';ctx.beginPath();ctx.moveTo(0,c.height/2);ctx.lineTo(c.width,c.height/2);ctx.stroke()}
async function startRecording(){try{rec.stream=await navigator.mediaDevices.getUserMedia({audio:true});rec.ctx=new AudioContext();let src=rec.ctx.createMediaStreamSource(rec.stream);rec.analyser=rec.ctx.createAnalyser();rec.analyser.fftSize=2048;src.connect(rec.analyser);rec.start=Date.now();$('startRecBtn').disabled=true;$('stopRecBtn').disabled=false;$('recStatus').textContent='Đang ghi âm';$('recDot').className='dot on';rec.timer=setInterval(()=>{let s=Math.floor((Date.now()-rec.start)/1000);$('recTime').textContent='00:'+String(s).padStart(2,'0');if(s>=60)stopRecording()},500);startSpeechRecognition();animateWave()}catch(e){alert('Không mở được mic: '+e.message)}}
function startSpeechRecognition(){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){$('recStatus').textContent='Không có speech recognition, hãy nhập tay transcript.';return}rec.recognition=new SR();rec.recognition.lang='en-US';rec.recognition.continuous=true;rec.recognition.interimResults=true;let finalText='';rec.recognition.onresult=e=>{let interim='';for(let i=e.resultIndex;i<e.results.length;i++){let t=e.results[i][0].transcript;if(e.results[i].isFinal)finalText+=t+' ';else interim+=t}$('recTranscript').value=(finalText+interim).trim()};rec.recognition.onerror=e=>{$('recStatus').textContent='Speech recognition: '+e.error};rec.recognition.start()}
function animateWave(){let c=$('wave'),ctx=c.getContext('2d'),buf=new Uint8Array(rec.analyser.fftSize);function loop(){if(!rec.analyser)return;rec.analyser.getByteTimeDomainData(buf);c.width=c.clientWidth;c.height=c.clientHeight;ctx.clearRect(0,0,c.width,c.height);ctx.strokeStyle='#2563eb';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<buf.length;i++){let x=i*c.width/buf.length,y=(buf[i]/128)*c.height/2;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();rec.raf=requestAnimationFrame(loop)}loop()}
function stopRecording(){try{if(rec.recognition)rec.recognition.stop()}catch(e){}if(rec.timer)clearInterval(rec.timer);if(rec.raf)cancelAnimationFrame(rec.raf);if(rec.stream)rec.stream.getTracks().forEach(t=>t.stop());if(rec.ctx)rec.ctx.close();rec.stream=null;rec.ctx=null;rec.analyser=null;$('startRecBtn').disabled=false;$('stopRecBtn').disabled=true;if($('recStatus'))$('recStatus').textContent='Đã dừng'}
async function sendRecording(){let ans=$('recTranscript').value.trim();if(!ans)return alert('Chưa có transcript. Hãy nói lại hoặc nhập tay.');closeRecorder();let target=currentMode==='speaking'?'sFeedback':currentMode==='roleplay'?'rFeedback':currentMode==='interview'?'intFeedback':currentMode==='ipa'?'ipaFeedback':'sFeedback';await analyzeAndRender(target,ans)}
async function analyzeAndRender(targetId,answer){if($(targetId))$(targetId).innerHTML='Đang phân tích...';let fb=await analyzeAnswer(currentMode,currentPrompt,answer);if($(targetId))$(targetId).innerHTML=renderFeedback(fb);}
async function analyzeAnswer(mode,question,answer){let res=await callAI({mode,question,answer,role:state.targetRole,profile:state.profile,extra:currentExtra});let data;if(res.ok){try{data=JSON.parse(res.text)}catch(e){data={correctSentence:answer,professionalAnswer:res.text,mistakes:['AI returned non-JSON.'],pronunciationNotes:[],usefulPhrases:[],followUpQuestion:'Can you give one specific example?',scores:{grammar:60,vocabulary:60,clarity:60,interviewQuality:60},summaryVietnamese:'AI trả về dạng text.'}}}else{data=fallback(answer)}state.errors.unshift({date:new Date().toLocaleString('vi-VN'),mode,question,answer,...data});save();renderErrors();return data}
async function callAI(payload){try{setAIStatus('testing');let r=await fetch(state.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let d=await r.json();if(r.ok){setAIStatus('online');return{ok:true,text:d.text||JSON.stringify(d),raw:d}}setAIStatus('offline');return{ok:false,text:JSON.stringify(d),raw:d}}catch(e){setAIStatus('offline');return{ok:false,text:e.message}}}
function fallback(a){return{correctSentence:a,professionalAnswer:'AI offline. Use a clear answer with action, reason, and result.',mistakes:['AI chưa kết nối hoặc OpenRouter đang lỗi provider.'],pronunciationNotes:['Test lại AI trong Settings.'],usefulPhrases:['hourly output','line capacity','delivery risk'],followUpQuestion:'What is your next action?',scores:{grammar:50,vocabulary:50,clarity:50,interviewQuality:50},summaryVietnamese:'Fallback mode.'}}
function followUpId(q){let id='fu_'+Date.now()+Math.random().toString(36).slice(2);followUpStore[id]=q;return id}function continueFollowUp(id){let q=followUpStore[id];if(!q)return alert('Không thấy follow-up.');currentPrompt=q;openRecorder(q)}function speakFollowUp(id){let q=followUpStore[id];if(q)speakText(q)}
function renderFeedback(f){let s=f.scores||{},follow=(f.followUpQuestion||'').trim(),fid=follow?followUpId(follow):'';return `<div class="grid grid2"><div class="fb full"><b>Correct sentence</b><br>${safe(f.correctSentence||'')}</div><div class="fb full"><b>Professional answer</b><br>${safe(f.professionalAnswer||'')}</div><div class="fb"><b>Main mistakes</b><br>${(f.mistakes||[]).map(x=>'• '+safe(x)).join('<br>')}</div><div class="fb"><b>Pronunciation notes</b><br>${(f.pronunciationNotes||[]).map(x=>'• '+safe(x)).join('<br>')}</div><div class="fb"><b>Useful phrases</b><br>${(f.usefulPhrases||[]).map(x=>`<span class="pill green">${safe(x)}</span>`).join('')}</div><div class="fb"><b>Follow-up question</b><br><h3>${safe(follow||'AI chưa tạo follow-up.')}</h3>${follow?`<div class="toolbar"><button class="btn blue" onclick="continueFollowUp('${fid}')">🎙 Trả lời follow-up</button><button class="btn light" onclick="speakFollowUp('${fid}')">🔊 Nghe follow-up</button></div>`:''}</div><div class="fb full"><div class="score-grid">${['grammar','vocabulary','clarity','interviewQuality'].map(k=>`<div class="score"><span class="small">${k}</span><br><b>${s[k]??'--'}</b></div>`).join('')}</div></div></div>`}
function exportErrors(){let blob=new Blob([JSON.stringify(state.errors,null,2)],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='error_notebook_v3.json';a.click();URL.revokeObjectURL(url)}
init();
</script>
